  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #ffffff; color: #333; }

    header { background: #ffffff; padding: 20px 0; }
    nav { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .logo { font-size: 35px; font-weight: bold; color: #333; }
    nav ul { list-style: none; display: flex; gap: 40px; }
    nav ul li a { text-decoration: none; color: #333; font-weight: 600; transition: color 0.3s; }
    nav ul li a:hover { color: #0077cc; }

    section { max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; }
    h2 { color: #1a73e8; margin-bottom: 50px; font-size: 2rem; }

    .contact-info {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-info h3 {
      color: #1a73e8;
      font-size: 1.8rem;
    }

    .contact-info p {
      font-size: 1.2rem;
      color: #555;
    }

    .instagram-btn, .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      padding: 12px 25px;
      border-radius: 30px;
      text-decoration: none;
      transition: background 0.3s;
      font-size: 1rem;
      margin-top: 10px;
      width: 200px;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
    }

    .instagram-btn {
      background: #E1306C;
      color: #fff;
    }
    .instagram-btn i { margin-right: 8px; }
    .instagram-btn:hover { background: #c1275b; }

    .whatsapp-btn {
      background: #0cd976;
      color: #fff;
    }
    .whatsapp-btn i { margin-right: 8px; }
    .whatsapp-btn:hover { background: #0abf6a; }

    footer { text-align: center; padding: 25px; background: #f0f4f8; margin-top: 60px; font-size: 0.9rem; color: #555; }

  </style>
</head>

      <p>Telefone: (11) 99999-9999</p>
      <p>E-mail: contato@techon.com.br</p>

        <i class="fab fa-instagram"></i> Instagram
