<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech On - Início</title>
  <link rel="stylesheet" href="estilo4.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
  <style>
    /* Regra para carregar a fonte 'Astron'. 
       Você precisa ter o arquivo da fonte no seu projeto. */
    @font-face {
      font-family: 'Astron';
      src: url('./fonts/Astron.woff') format('woff'),
           url('./fonts/Astron.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; }
    header { background: #ffffff; padding: 20px 0; }
    nav { 
      max-width: 1200px; 
      margin: 0 auto; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 20px; 
    }
    .logo { /* Estiliza a nova logo de texto */
      font-family: 'Astron', sans-serif; /* Aplica a fonte Astron */
      font-size: 35px;
      font-weight: bold;
      color: #333;
    }
    nav ul { 
      list-style: none; 
      display: flex; 
      gap: 40px; 
      align-items: center; 
    }
    nav ul li a { 
      text-decoration: none; 
      color: #333; 
      font-weight: 600; 
      transition: color 0.3s; 
    }
    nav ul li a:hover { color: #0077cc; }
    .hero { text-align: center; padding: 50px 20px; background: #eaf4ff; }
    .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
    .hero p { font-size: 1.2rem; margin-bottom: 20px; }
    .hero button a { color: white; text-decoration: none; }
    .hero button { padding: 12px 25px; background: #0077cc; border: none; color: white; border-radius: 30px; font-size: 1rem; cursor: pointer; }
    .cards { 
        display: flex; 
        justify-content: center; 
        gap: 30px; 
        padding: 30px; 
        flex-wrap: wrap; 
        align-items: stretch; 
    }
    .card { 
        text-align: center; 
        background: white; 
        padding: 20px; 
        border-radius: 15px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        width: 300px;
        display: flex; 
        flex-direction: column;
        justify-content: space-between;
    }
    .card img { 
        width: 100%; 
        height: 250px; 
        object-fit: cover; 
        border-radius: 12px; 
    }
    .card p { font-size: 1.2rem; margin-top: 10px; color: #0077cc; }
    footer { text-align: center; padding: 20px; background: #f0f4f8; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <nav>
        <img src="TECH.png" alt="Nova Logo" class="logo-img" width="165">

      <ul>
        <li><a href="Techon.html">Início</a></li>
        <li><a href="sobretech.html">Sobre</a></li>
        <li><a href="produtostech.html">Produtos</a></li>
        <li><a href="contatotech.html">Contato</a></li>
        <li><a href="carrinhotech.html">Carrinho</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>O melhor dos AirPods Pro está aqui!</h1>
    <p>Qualidade de som premium, cancelamento de ruído e conforto incomparável.</p>
    <button><a href="produtostech.html">Ver Produtos</a></button>
  </section>

  <section class="cards">
    <div class="card">
      <h3>AirPods Pro 2ª Geração</h3>
      <img src="airpod.jpeg" alt="AirPods Pro 6"> 
      <p>R$ 139,90</p>
    </div>

    <div class="card">
      <h3>AirPods Max</h3>
      <img src="fone.jpeg" alt="AirPods Pro Limited">
      <p>R$ 289,90</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 Tech On. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
